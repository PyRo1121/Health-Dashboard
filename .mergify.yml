pull_request_rules:
  - name: Merge automerge PRs after required checks
    conditions:
      - label=automerge
      - label=merge-ready
      - -label=do-not-merge
      - -label=work-in-progress
      - -label=blocked-ci
      - -label=blocked-review
      - -label=blocked-author
      - -label=stale-review
      - -draft
      - conflict=false
      - check-success=AI Code Review
      - check-success=Analyze (javascript-typescript)
      - check-success=Build
      - check-success=Component Tests
      - check-success=Danger PR Checks
      - check-success=Dependency Review
      - check-success=Lint
      - check-success=Reviewdog PR Comments
      - check-success=Type Check
      - check-success=Unit Tests
      - check-success=playwright
      - "#approved-reviews-by >= 1"
    actions:
      merge:
        method: squash
        commit_message_template: |
          {{ title }} (#{{ number }})

  - name: Rebase automerge PRs when behind
    conditions:
      - label=automerge
      - conflict=false
      - behind
    actions:
      rebase: {}

  - name: Mark large PRs
    conditions:
      - "files > 20"
    actions:
      label:
        add:
          - large-pr
