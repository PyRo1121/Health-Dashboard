name: HealthCockpitCompanion

options:
  minimumXcodeGenVersion: 2.39.0
  deploymentTarget:
    iOS: '17.0'

configs:
  Debug: debug
  Release: release

settings:
  base:
    PRODUCT_NAME: HealthCockpitCompanion
    PRODUCT_BUNDLE_IDENTIFIER: com.healthcockpit.ioscompanion
    SWIFT_VERSION: 5.10
    DEVELOPMENT_TEAM: ''
    SUPPORTS_MACCATALYST: NO
    TARGETED_DEVICE_FAMILY: '1'

targets:
  HealthCockpitCompanion:
    type: application
    platform: iOS
    deploymentTarget: '17.0'
    sources:
      - path: App
      - path: Core
      - path: HealthKit
      - path: ViewModels
    info:
      path: App/Info.plist
    settings:
      base:
        INFOPLIST_FILE: App/Info.plist
    scheme:
      testTargets:
        - HealthCockpitCompanionTests

  HealthCockpitCompanionTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: '17.0'
    sources:
      - path: Tests/HealthCockpitCompanionTests
    dependencies:
      - target: HealthCockpitCompanion
