name: 📊 Grok PR Portfolio

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  portfolio:
    name: PR Portfolio
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Build PR portfolio summary
        uses: actions/github-script@v8
        with:
          script: |
            const marker = '<!-- grok-pr-portfolio -->';
            const prs = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            const lines = [
              marker,
              '# Grok PR Portfolio',
              '',
              `Open PRs: ${prs.length}`,
              '',
            ];
            const buckets = {
              'merge-ready': [],
              'blocked-ci': [],
              'blocked-review': [],
              'blocked-author': [],
              other: [],
            };

            for (const pr of prs.slice(0, 25)) {
              const checks = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: pr.head.sha,
                per_page: 100,
              });
              const failed = checks.data.check_runs.filter((run) => run.conclusion === 'failure');
              const pending = checks.data.check_runs.filter((run) => run.status !== 'completed');
              const labels = (pr.labels || []).map((label) => label.name);
              const status =
                labels.includes('merge-ready')
                  ? 'merge-ready'
                  : labels.includes('blocked-ci')
                    ? 'blocked-ci'
                    : labels.includes('blocked-review')
                      ? 'blocked-review'
                      : labels.includes('blocked-author')
                        ? 'blocked-author'
                        : 'other';

              buckets[status].push({
                number: pr.number,
                title: pr.title,
                labels: labels.join(', ') || 'none',
                failed: failed.length ? failed.map((run) => run.name).join(', ') : 'none',
                pending: pending.length ? pending.map((run) => run.name).join(', ') : 'none',
              });
            }

            lines.push('## Queue by state', '');
            for (const [heading, entries] of Object.entries(buckets)) {
              lines.push(`### ${heading}`, '');
              if (!entries.length) {
                lines.push('- none', '');
                continue;
              }

              for (const entry of entries) {
                lines.push(
                  `- #${entry.number} ${entry.title}`,
                  `  - labels: ${entry.labels}`,
                  `  - failed checks: ${entry.failed}`,
                  `  - pending checks: ${entry.pending}`,
                  ''
                );
              }
            }

            const body = lines.join('\n');
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const existing = issues.find((issue) => issue.body?.includes(marker));
            const title = `Grok PR Portfolio · ${new Date().toISOString().slice(0, 10)}`;

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                title,
                body,
                labels: ['automation'],
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['automation'],
              });
            }
