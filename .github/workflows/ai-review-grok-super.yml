name: 🤖 Grok 4.1 Fast Super Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: grok-super-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  contents: read
  issues: write

jobs:
  grok-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Prepare PR context
        id: diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git diff --no-color --unified=3 "${BASE_SHA}...HEAD" > "$RUNNER_TEMP/pr.diff"
          git diff --name-only "${BASE_SHA}...HEAD" > "$RUNNER_TEMP/pr.files"
          echo "diff_path=$RUNNER_TEMP/pr.diff" >> "$GITHUB_OUTPUT"
          echo "files_path=$RUNNER_TEMP/pr.files" >> "$GITHUB_OUTPUT"

      - name: Run Grok structured review
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          XAI_MODEL: grok-4-1-fast-reasoning
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_DIFF_PATH: ${{ steps.diff.outputs.diff_path }}
          PR_FILES_PATH: ${{ steps.diff.outputs.files_path }}
          REVIEW_JSON_PATH: ${{ runner.temp }}/grok-review.json
          REVIEW_MARKDOWN_PATH: ${{ runner.temp }}/grok-review.md
        run: node .github/scripts/grok-review.mjs

      - name: Upsert review comment
        uses: actions/github-script@v7
        env:
          REVIEW_MARKDOWN_PATH: ${{ runner.temp }}/grok-review.md
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync(process.env.REVIEW_MARKDOWN_PATH, 'utf8');
            const marker = '<!-- grok-super-review -->';
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }

      - name: Sync review labels
        uses: actions/github-script@v7
        env:
          REVIEW_JSON_PATH: ${{ runner.temp }}/grok-review.json
        with:
          script: |
            const fs = require('fs');
            const result = JSON.parse(fs.readFileSync(process.env.REVIEW_JSON_PATH, 'utf8'));
            const labelsToAdd = ['grok-reviewed'];
            const labelsToRemove = ['security-issue', 'needs-review', 'has-patch', 'grok-approved'];
            const issues = Array.isArray(result.issues) ? result.issues : [];

            if (issues.some((issue) => issue.severity === 'critical')) {
              labelsToAdd.push('security-issue');
            }
            if (issues.some((issue) => issue.severity === 'high')) {
              labelsToAdd.push('needs-review');
            }
            if (typeof result.patch === 'string' && result.patch.trim()) {
              labelsToAdd.push('has-patch');
            }
            if (result.overall_approval === 'approve') {
              labelsToAdd.push('grok-approved');
            }

            const desired = new Set(labelsToAdd);
            const existing = new Set((context.payload.pull_request.labels || []).map((label) => label.name));

            if (labelsToAdd.length) {
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: labelsToAdd,
              });
            }

            for (const label of labelsToRemove) {
              if (existing.has(label) && !desired.has(label)) {
                try {
                  await github.rest.issues.removeLabel({
                    issue_number: context.issue.number,
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label,
                  });
                } catch {}
              }
            }

      - name: Upload Grok review artifact
        uses: actions/upload-artifact@v4
        with:
          name: grok-review-artifact
          path: |
            ${{ runner.temp }}/grok-review.json
            ${{ runner.temp }}/grok-review.md
