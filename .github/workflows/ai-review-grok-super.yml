name: 🤖 Grok 4.1 Fast Super Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: grok-super-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  statuses: write
  pull-requests: write
  contents: read
  issues: write

jobs:
  grok-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare PR context
        id: diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git diff --no-color --unified=3 "${BASE_SHA}...HEAD" > "$RUNNER_TEMP/pr.diff"
          git diff --name-only "${BASE_SHA}...HEAD" > "$RUNNER_TEMP/pr.files"
          echo "diff_path=$RUNNER_TEMP/pr.diff" >> "$GITHUB_OUTPUT"
          echo "files_path=$RUNNER_TEMP/pr.files" >> "$GITHUB_OUTPUT"

      - name: Run Grok structured review
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          XAI_MODEL: grok-4-1-fast-reasoning
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_DIFF_PATH: ${{ steps.diff.outputs.diff_path }}
          PR_FILES_PATH: ${{ steps.diff.outputs.files_path }}
          REVIEW_JSON_PATH: ${{ runner.temp }}/grok-review.json
          REVIEW_MARKDOWN_PATH: ${{ runner.temp }}/grok-review.md
        run: node .github/scripts/grok-review.mjs

      - name: Create GitHub Review with Inline Comments
        uses: actions/github-script@v8
        env:
          REVIEW_MARKDOWN_PATH: ${{ runner.temp }}/grok-review.md
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync(process.env.REVIEW_MARKDOWN_PATH, 'utf8');
            const marker = '<!-- grok-super-review -->';
            
            // Load inline comments if available
            let inlineComments = [];
            try {
              const inlineCommentsPath = '/tmp/inline-comments.json';
              inlineComments = JSON.parse(fs.readFileSync(inlineCommentsPath, 'utf8'));
            } catch (e) {
              // No inline comments
            }
            
            // Determine review event based on approval status
            const result = JSON.parse(fs.readFileSync('${{ runner.temp }}/grok-review.json', 'utf8'));
            let event = 'COMMENT';
            if (result.overall_approval === 'approve') {
              event = 'APPROVE';
            } else if (result.overall_approval === 'request_changes') {
              event = 'REQUEST_CHANGES';
            }
            
            // Try to find existing review
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            
            const existingReview = reviews.find(r => r.user.login === 'github-actions[bot]');
            
            if (existingReview) {
              // Update existing review (only body is valid, not event)
              await github.rest.pulls.updateReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                review_id: existingReview.id,
                body,
              });
            } else {
              // Create a comment as the review (fallback approach)
              // Note: Full review with event requires GraphQL or raw API due to Octokit limitations
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }

      - name: Sync review labels
        uses: actions/github-script@v8
        env:
          REVIEW_JSON_PATH: ${{ runner.temp }}/grok-review.json
        with:
          script: |
            const fs = require('fs');
            const result = JSON.parse(fs.readFileSync(process.env.REVIEW_JSON_PATH, 'utf8'));
            const labelsToAdd = [];
            const labelsToRemove = ['security-issue', 'needs-review', 'has-patch'];
            const issues = Array.isArray(result.issues) ? result.issues : [];

            if (issues.some((issue) => issue.severity === 'critical')) {
              labelsToAdd.push('security-issue');
            }
            if (issues.some((issue) => issue.severity === 'high')) {
              labelsToAdd.push('needs-review');
            }
            if (typeof result.patch === 'string' && result.patch.trim()) {
              labelsToAdd.push('has-patch');
            }

            const desired = new Set(labelsToAdd);
            const existing = new Set((context.payload.pull_request.labels || []).map((label) => label.name));

            if (labelsToAdd.length) {
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: labelsToAdd,
              });
            }

            for (const label of labelsToRemove) {
              if (existing.has(label) && !desired.has(label)) {
                try {
                  await github.rest.issues.removeLabel({
                    issue_number: context.issue.number,
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label,
                  });
                } catch {}
              }
            }

      - name: Upload Grok review artifact
        uses: actions/upload-artifact@v7
        with:
          name: grok-review-artifact
          path: |
            ${{ runner.temp }}/grok-review.json
            ${{ runner.temp }}/grok-review.md
