name: DAST

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL for ZAP scan'
        required: true
        default: 'http://localhost:5173'
        type: string
      scan_type:
        description: 'Scan type'
        required: true
        default: 'baseline'
        type: choice
        options:
          - baseline
          - full
          - api
      zap_auth:
        description: 'Enable ZAP authentication'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: dast-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  zap-scan:
    name: ZAP Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Check out repository
        uses: actions/checkout@d0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: ZAP Baseline Scan
        if: github.event.inputs.scan_type == 'baseline' || github.event_name == 'schedule'
        uses: zaproxy/action-baseline@bee4e5be916301228d2b1b2dcad73aab6fa6a25b
        with:
          target: ${{ github.event.inputs.target_url || 'http://localhost:5173' }}
          rules_file_name: '.zap/rules.yaml'
          cmd_options: |
            -config api.key=
            -config scanner.attackOnStart=true
            -config view.skipLinesNumber=50

      - name: ZAP Full Scan
        if: github.event.inputs.scan_type == 'full'
        uses: zaproxy/action-full-scan@bee4e5be916301228d2b1b2dcad73aab6fa6a25b
        with:
          target: ${{ github.event.inputs.target_url }}
          rules_file_name: '.zap/rules.yaml'
          cmd_options: |
            -config api.key=
            -spider -ajax

      - name: ZAP API Scan
        if: github.event.inputs.scan_type == 'api'
        uses: zaproxy/action-api-scan@bee4e5be916301228d2b1b2dcad73aab6fa6a25b
        with:
          target: ${{ github.event.inputs.target_url }}
          openapi_file: 'docs/api/openapi.yaml'

      - name: Upload ZAP results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: zap-results
          path: |
            zap_report.html
            zap_results.json
          retention-days: 14

      - name: Upload ZAP SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13
        with:
          sarif_file: zap_report.sarif.json
          category: '/zap'
