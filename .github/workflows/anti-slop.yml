name: Anti-Slop PR Quality Gate

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  contents: read
  issues: read
  pull-requests: write

jobs:
  anti-slop:
    runs-on: ubuntu-latest
    steps:
      - uses: peakoss/anti-slop@v0
        with:
          max-failures: 4
          action: label
          require-description: true
