name: CodeQL

on:
  push:
    branches:
      - main
    paths:
      - '**.ts'
      - '**.js'
      - '**.svelte'
      - 'src/**'
  pull_request:
    branches:
      - main
    paths:
      - '**.ts'
      - '**.js'
      - '**.svelte'
      - 'src/**'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@d0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13
        with:
          languages: typescript
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13
        with:
          category: '/language:typescript'
          upload: true
