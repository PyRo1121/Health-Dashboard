name: 🏷️ Label Sync

on:
  push:
    branches: [main]
    paths:
      - .github/labels.json
      - .github/scripts/sync-labels.mjs
      - .github/workflows/label-sync.yml
  schedule:
    - cron: '15 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  sync-labels:
    name: Sync Labels
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Sync canonical labels
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/sync-labels.mjs .github/labels.json
