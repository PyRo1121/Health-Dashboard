name: 🤖 Grok 4.1 Fast Auto-Fix

on:
  pull_request:
    types: [labeled]

concurrency:
  group: grok-auto-fix-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write

jobs:
  auto-fix:
    if: >-
      github.event.label.name == 'ai-auto-fix' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Preflight trusted branch guard
        id: guard
        run: |
          if [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "skip_reason=fork-pr" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip_reason=" >> "$GITHUB_OUTPUT"

      - name: Check out PR branch
        if: steps.guard.outputs.skip_reason == ''
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Bun
        if: steps.guard.outputs.skip_reason == ''
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        if: steps.guard.outputs.skip_reason == ''
        run: bun install --frozen-lockfile

      - name: Prepare PR context
        id: diff
        if: steps.guard.outputs.skip_reason == ''
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git diff --no-color --unified=3 "${BASE_SHA}...HEAD" > "$RUNNER_TEMP/pr.diff"
          git diff --name-only "${BASE_SHA}...HEAD" > "$RUNNER_TEMP/pr.files"
          echo "diff_path=$RUNNER_TEMP/pr.diff" >> "$GITHUB_OUTPUT"
          echo "files_path=$RUNNER_TEMP/pr.files" >> "$GITHUB_OUTPUT"

      - name: Guard protected paths
        id: path_guard
        if: steps.guard.outputs.skip_reason == ''
        env:
          FILES_PATH: ${{ steps.diff.outputs.files_path }}
        run: |
          if grep -Eq '^(\.github/|tests/|docs/|package\.json$|bun\.lockb?$|package-lock\.json$|pnpm-lock\.yaml$|yarn\.lock$|tsconfig\.json$|svelte\.config\.js$|vite\.config\.ts$)' "$FILES_PATH"; then
            echo "skip_reason=protected-paths" >> "$GITHUB_OUTPUT"
          else
            echo "skip_reason=" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate Grok fix patch
        id: generate
        if: steps.guard.outputs.skip_reason == '' && steps.path_guard.outputs.skip_reason == ''
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          XAI_MODEL: grok-4-1-fast-reasoning
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_DIFF_PATH: ${{ steps.diff.outputs.diff_path }}
          PR_FILES_PATH: ${{ steps.diff.outputs.files_path }}
          FIX_JSON_PATH: ${{ runner.temp }}/grok-fix.json
          FIX_MARKDOWN_PATH: ${{ runner.temp }}/grok-fix.md
          PATCH_PATH: ${{ runner.temp }}/grok-fix.patch
        run: node .github/scripts/grok-auto-fix.mjs

      - name: Apply validated patch
        id: apply
        if: steps.guard.outputs.skip_reason == '' && steps.path_guard.outputs.skip_reason == ''
        env:
          PATCH_PATH: ${{ runner.temp }}/grok-fix.patch
        run: |
          if [ ! -s "$PATCH_PATH" ]; then
            echo "fix_applied=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git apply --check "$PATCH_PATH"
          git apply "$PATCH_PATH"
          echo "fix_applied=true" >> "$GITHUB_OUTPUT"

      - name: Upsert auto-fix comment
        if: steps.guard.outputs.skip_reason == '' && steps.path_guard.outputs.skip_reason == ''
        uses: actions/github-script@v9
        env:
          FIX_MARKDOWN_PATH: ${{ runner.temp }}/grok-fix.md
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- grok-auto-fix -->';
            const fixMarkdown = fs.readFileSync(process.env.FIX_MARKDOWN_PATH, 'utf8');
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fixMarkdown,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: fixMarkdown,
              });
            }

      - name: Validate patched branch
        if: steps.guard.outputs.skip_reason == '' && steps.path_guard.outputs.skip_reason == '' && steps.apply.outputs.fix_applied == 'true'
        run: bun run check:ci

      - name: Commit and push Grok fix
        if: steps.guard.outputs.skip_reason == '' && steps.path_guard.outputs.skip_reason == '' && steps.apply.outputs.fix_applied == 'true'
        env:
          FIX_JSON_PATH: ${{ runner.temp }}/grok-fix.json
        run: |
          REASONING=$(node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync(process.env.FIX_JSON_PATH,'utf8')); process.stdout.write((data.reasoning || 'High-confidence minimal patch from Grok.').replace(/\\s+/g,' ').trim());")
          FILES=$(node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync(process.env.FIX_JSON_PATH,'utf8')); process.stdout.write((data.touchedFiles || []).join('\n'));")
          if [ -z "$FILES" ]; then
            echo "No touched files recorded for Grok auto-fix."
            exit 1
          fi
          git config --local user.name "Grok AI"
          git config --local user.email "grok@x.ai"
          while IFS= read -r file; do
            [ -n "$file" ] && git add -- "$file"
          done <<< "$FILES"
          cat > /tmp/grok-commit-message.txt <<EOF
          fix: grok-4-1-fast auto-fix

          Reasoning: ${REASONING:-High-confidence minimal patch from Grok.}

          Co-authored-by: Grok 4.1 Fast <grok@x.ai>
          EOF
          git commit -F /tmp/grok-commit-message.txt
          git push

      - name: Sync auto-fix labels
        if: always()
        uses: actions/github-script@v9
        with:
          script: |
            const fixApplied = '${{ steps.apply.outputs.fix_applied }}' === 'true';

            if (fixApplied) {
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: ['ai-fix-applied'],
              });
            }

            for (const name of ['has-patch', 'ai-auto-fix']) {
              try {
                await github.rest.issues.removeLabel({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name,
                });
              } catch {}
            }

      - name: Upload Grok auto-fix artifact
        if: always() && steps.guard.outputs.skip_reason == '' && steps.path_guard.outputs.skip_reason == ''
        uses: actions/upload-artifact@v7
        with:
          name: grok-auto-fix-artifact
          path: |
            ${{ runner.temp }}/grok-fix.json
            ${{ runner.temp }}/grok-fix.patch

      - name: Refresh PR manager after auto-fix
        if: always()
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'pr-manager-grok.yml',
              ref: context.payload.pull_request.base.ref,
              inputs: { pr_number: String(context.issue.number) },
            });

