name: 🤖 Grok 4.1 Fast Auto-Fix

on:
  pull_request_target:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-fix:
    if: contains(github.event.label.name, 'ai-auto-fix')
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Get PR diff
        id: diff
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          git diff origin/${{ env.BASE_REF }}...HEAD >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          echo "files<<EOF" >> $GITHUB_OUTPUT
          git diff origin/${{ env.BASE_REF }}...HEAD --name-only >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Get Grok fix patch
        id: fix
        uses: actions/github-script@v7
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        with:
          result-encoding: json
          script: |
            const { OpenAI } = require('openai');
            const openai = new OpenAI({
              apiKey: process.env.XAI_API_KEY,
              baseURL: 'https://api.x.ai/v1'
            });

            const diff = `$${{ steps.diff.outputs.diff }}`;
            const files = `$${{ steps.diff.outputs.files }}`.split('\n').filter(Boolean);

            const response = await openai.chat.completions.create({
              model: 'grok-4-1-fast-reasoning',
              temperature: 0.1,
              max_tokens: 4000,
              response_format: { type: "json_object" },
              messages: [
                {
                  role: "system",
                  content: `You are an elite TypeScript/SvelteKit code fix generator.
Generate a minimal, focused patch to fix issues in the PR.
Output ONLY valid JSON with this exact schema:
{
  "patch": "unified diff patch string (empty if no fix needed)",
  "reasoning": "brief explanation of what was fixed"
}
RULES:
- Only fix actual bugs, not style issues
- Do NOT modify: workflows, tests, configs, package.json, lockfiles
- Keep patch minimal - single responsibility
- If uncertain, return empty patch`
                },
                {
                  role: "user",
                  content: `PR Title: ${{ github.event.pull_request.title }}

Changed Files:\n${files.join('\n')}\n\nDiff:\n${diff}`
                }
              ]
            });

            const result = JSON.parse(response.choices[0].message.content);
            return result;

      - name: Apply Grok patch & commit
        id: apply
        if: steps.fix.outputs.patch != ''
        env:
          PATCH: ${{ steps.fix.outputs.patch }}
          REASONING: ${{ steps.fix.outputs.reasoning }}
        run: |
          echo "${{ env.PATCH }}" > /tmp/grok-fix.patch
          
          if git apply /tmp/grok-fix.patch; then
            echo "✅ Patch applied successfully"
            git config --local user.name "Grok AI"
            git config --local user.email "grok@x.ai"
            git add -A
            git diff --cached --stat
            git commit -m "fix: grok-4-1-fast auto-fix

Reasoning: ${{ env.REASONING }}
            
Co-authored-by: Grok 4.1 Fast <grok@x.ai>"
            git push
            echo "fix_applied=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Patch application failed"
            echo "fix_applied=false" >> $GITHUB_OUTPUT
          fi

      - name: Report fix result
        uses: actions/github-script@v7
        with:
          script: |
            const fixApplied = '$${{ steps.apply.outputs.fix_applied }}' === 'true';
            const result = ${{ steps.fix.outputs.result }};
            
            const comment = fixApplied 
              ? `## 🤖 Grok Auto-Fix Applied ✅

**Fix:** ${result?.reasoning || 'Patch applied successfully'}

The fix has been committed to this PR. CI will re-run automatically.

---
*Applied by Grok 4.1 Fast via xAI*`
              : `## 🤖 Grok Auto-Fix Report

**Status:** ${result?.patch ? '⚠️ Patch could not be applied' : '✅ No fix needed'}

${result?.reasoning ? `**Reasoning:** ${result.reasoning}` : ''}

---
*Grok 4.1 Fast via xAI*`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Remove ai-auto-fix label
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'ai-auto-fix'
              });
            } catch (e) {
              // Label may not exist
            }
