name: 🚶 Grok Walkthrough

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number'
        required: true
        type: string

permissions:
  pull-requests: write
  contents: read

jobs:
  walkthrough:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Get PR details
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.inputs.pr_number }}
          PR_TITLE=$(gh pr view $PR_NUMBER --json title --jq '.title')
          echo "title=$PR_TITLE" >> "$GITHUB_OUTPUT"
          
          BASE_SHA=$(gh pr view $PR_NUMBER --json baseRefOid --jq '.baseRefOid')
          echo "base_sha=$BASE_SHA" >> "$GITHUB_OUTPUT"

      - name: Prepare diff
        env:
          BASE_SHA: ${{ steps.pr.outputs.base_sha }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
        run: |
          git fetch --no-tags origin "pull/${PR_NUMBER}/head:pr-${PR_NUMBER}"
          git diff --no-color --unified=3 "${BASE_SHA}...pr-${PR_NUMBER}" > "$RUNNER_TEMP/pr.diff"
          git diff --name-only "${BASE_SHA}...pr-${PR_NUMBER}" > "$RUNNER_TEMP/pr.files"
          echo "diff_path=$RUNNER_TEMP/pr.diff" >> "$GITHUB_OUTPUT"
          echo "files_path=$RUNNER_TEMP/pr.files" >> "$GITHUB_OUTPUT"

      - name: Run walkthrough
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          XAI_MODEL: grok-4-1-fast-reasoning
          PR_TITLE: ${{ steps.pr.outputs.title }}
          PR_DIFF_PATH: ${{ runner.temp }}/pr.diff
          PR_FILES_PATH: ${{ runner.temp }}/pr.files
          WALKTHROUGH_JSON_PATH: ${{ runner.temp }}/grok-walkthrough.json
          WALKTHROUGH_MARKDOWN_PATH: ${{ runner.temp }}/grok-walkthrough.md
        run: node .github/scripts/grok-walkthrough.mjs

      - name: Post walkthrough comment
        uses: actions/github-script@v8
        env:
          WALKTHROUGH_MARKDOWN_PATH: ${{ runner.temp }}/grok-walkthrough.md
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
        with:
          script: |
            const fs = require('fs');
            const markdown = fs.readFileSync(process.env.WALKTHROUGH_MARKDOWN_PATH, 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(process.env.PR_NUMBER),
              body: markdown,
            });
