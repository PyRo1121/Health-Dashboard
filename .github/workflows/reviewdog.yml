name: Reviewdog Lint Comments

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  reviewdog:
    name: Reviewdog PR Comments
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@d0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup reviewdog
        uses: reviewdog/action-setup@f998ba012e55b009e67d397d5304a0a2fc84efb0

      - name: Run ESLint with reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx eslint . --format=json > eslint_results.json 2>/dev/null || true
          reviewdog -f=eslint-json -reporter=github-pr-review -level=warning < eslint_results.json

      - name: Run Prettier with reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bunx prettier --check . 2>&1 | tee prettier_output.txt || true
          if grep -q "warn" prettier_output.txt || grep -q "error" prettier_output.txt; then
            echo "Prettier issues found" | reviewdog -f=checkstyle -reporter=github-pr-review -name="prettier"
          fi
