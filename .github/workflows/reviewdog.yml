name: Reviewdog Lint Comments

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  reviewdog:
    name: Reviewdog PR Comments
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup reviewdog
        uses: reviewdog/action-setup@v1.5.0

      - name: Run ESLint with reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx eslint . --format json 2>&1 | reviewdog -f=eslint -reporter=github-pr-check -level=warning

      - name: Run Prettier with reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bunx prettier --check . 2>&1 | reviewdog -f=checkstyle -reporter=github-pr-check -name="prettier" || true
