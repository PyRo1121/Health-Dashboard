name: 🛡️ Grok Threat Monitor

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: grok-threat-monitor-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  threat-monitor:
    name: Threat Monitor
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Sync canonical labels
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/sync-labels.mjs .github/labels.json

      - name: Run Grok threat monitor
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          XAI_MODEL: grok-4-1-fast-reasoning
          THREAT_JSON_PATH: ${{ runner.temp }}/grok-threat-monitor.json
          THREAT_MARKDOWN_PATH: ${{ runner.temp }}/grok-threat-monitor.md
          THREAT_FIX_CANDIDATES_PATH: ${{ runner.temp }}/threat-fix-candidates.json
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node .github/scripts/grok-threat-monitor.mjs

      - name: Upsert threat monitor issue
        uses: actions/github-script@v8
        env:
          THREAT_JSON_PATH: ${{ runner.temp }}/grok-threat-monitor.json
          THREAT_MARKDOWN_PATH: ${{ runner.temp }}/grok-threat-monitor.md
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- grok-threat-monitor -->';
            const result = JSON.parse(fs.readFileSync(process.env.THREAT_JSON_PATH, 'utf8'));
            const body = fs.readFileSync(process.env.THREAT_MARKDOWN_PATH, 'utf8');
            const labels = ['threat-monitor'];
            if (['high', 'critical'].includes(String(result.severity || '').toLowerCase())) {
              labels.push('security-issue');
              labels.push('threat-high');
            } else if (String(result.severity || '').toLowerCase() === 'medium') {
              labels.push('threat-medium');
            }

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            const existing = issues.find((issue) => issue.body?.includes(marker));
            const title = `Grok Threat Monitor · ${String(result.severity || 'none').toUpperCase()}`;

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                title,
                body,
                labels,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels,
              });
            }

      - name: Create dependency fix PR for high-confidence threats
        id: autofix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CANDIDATES_PATH: ${{ runner.temp }}/threat-fix-candidates.json
        run: |
          if [ "$(jq 'length' "$CANDIDATES_PATH")" -eq 0 ]; then
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BRANCH="threat-fix/$(date +%Y%m%d%H%M%S)"
          git config user.name "Grok Threat Monitor"
          git config user.email "grok-threat@x.ai"
          git checkout -b "$BRANCH"

          jq -r '.[] | "\(.package)\t\(.scope)\t\(.targetVersion)"' "$CANDIDATES_PATH" | while IFS=$'\t' read -r pkg scope target; do
            if [ "$scope" = "devDependencies" ]; then
              bun add -d "${pkg}@${target}"
            else
              bun add "${pkg}@${target}"
            fi
          done

          bun run check:ci
          git add package.json bun.lock
          if git diff --cached --quiet; then
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "chore: threat monitor dependency updates"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push -u origin "$BRANCH"

          gh pr create \
            --title "chore: threat monitor dependency updates" \
            --body "Generated by Grok threat monitor from high-confidence dependency findings." \
            --base main \
            --head "$BRANCH" \
            --label dependencies \
            --label threat-fix-pr \
            --label security-issue \
            --label automation

          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Upload threat monitor artifact
        uses: actions/upload-artifact@v7
        with:
          name: grok-threat-monitor-artifact
          path: |
            ${{ runner.temp }}/grok-threat-monitor.json
            ${{ runner.temp }}/grok-threat-monitor.md
            ${{ runner.temp }}/threat-fix-candidates.json
