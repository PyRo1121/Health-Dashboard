name: Docs Inventory Sync

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - 'scripts/generate-workflow-inventory.mjs'
      - 'docs/ops/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: docs-inventory-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Regenerate workflow inventory
        run: node scripts/generate-workflow-inventory.mjs

      - name: Create docs sync PR
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'docs(ops): refresh CI workflow inventory'
          title: 'docs(ops): refresh CI workflow inventory'
          body: |
            Automated docs sync for GitHub Actions workflow inventory.
          branch: chore/docs-workflow-inventory
          delete-branch: true
          labels: |
            documentation
            ci
            docs-only
