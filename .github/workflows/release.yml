name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      skip_sbom:
        description: 'Skip SBOM generation'
        required: false
        default: false
        type: boolean
      skip_trivy:
        description: 'Skip Trivy scanning'
        required: false
        default: false
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  attestations: write
  id-token: write
  security-events: write
  packages: write

env:
  BUN_VERSION: 1.3.10

jobs:
  build:
    name: Build Release Artifact
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read

    outputs:
      artifact-sha256: ${{ steps.hash.outputs.sha256 }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Package artifact
        run: tar -czf build.tar.gz -C build .

      - name: Hash artifact
        id: hash
        run: |
          SHA256=$(sha256sum build.tar.gz | awk '{print $1}')
          echo "$SHA256" > build.sha256
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-artifact
          path: |
            build.tar.gz
            build.sha256
          retention-days: 30

      - name: Generate artifact attestation
        if: github.event_name == 'push'
        uses: actions/attest@v4
        with:
          subject-path: build.tar.gz
          provenance-format: 'slsa'

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    if: ${{ github.event_name == 'push' || !inputs.skip_sbom }}

    permissions:
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: release-artifact
          path: .

      - name: Extract build artifact
        run: |
          mkdir -p build
          tar -xzf build.tar.gz -C build

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: build
          format: spdx-json
          output-file: sbom.spdx.json
          artifact-name: health-app-${{ github.ref_name }}

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-artifact
          path: sbom.spdx.json
          retention-days: 90

  scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    if: ${{ github.event_name == 'push' || !inputs.skip_trivy }}

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: release-artifact
          path: .

      - name: Extract build artifact
        run: |
          mkdir -p build
          tar -xzf build.tar.gz -C build

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: fs
          scan-ref: build
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Upload Trivy results to GitHub Security
        if: github.event_name == 'push'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: '/trivy'

      - name: Upload Trivy artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-artifact
          path: trivy-results.sarif
          retention-days: 30

  sign:
    name: Sign Artifact
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build

    permissions:
      id-token: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: release-artifact
          path: .

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign build artifact blob
        run: cosign sign-blob --yes build.tar.gz --bundle build.bundle.json --output-signature build.sig --output-certificate build.pem

      - name: Verify blob signature
        run: cosign verify-blob build.tar.gz --bundle build.bundle.json --signature build.sig --certificate build.pem

      - name: Upload signature artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signature-artifacts
          path: |
            build.bundle.json
            build.sig
            build.pem
          retention-days: 90

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build, sign, sbom, scan]
    if: ${{ github.event_name == 'push' }}

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          files: |
            artifacts/release-artifact/build.tar.gz
            artifacts/release-artifact/build.sha256
            artifacts/sbom-artifact/sbom.spdx.json
            artifacts/trivy-artifact/trivy-results.sarif
            artifacts/signature-artifacts/build.bundle.json
            artifacts/signature-artifacts/build.sig
            artifacts/signature-artifacts/build.pem
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
