name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      skip_sbom:
        description: 'Skip SBOM generation'
        required: false
        default: 'false'
        type: boolean
      skip_trivy:
        description: 'Skip Trivy scanning'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  attestations: write
  id-token: write
  security-events: write
  packages: write

env:
  BUN_VERSION: 1.3.10

jobs:
  build:
    name: Build Release Artifact
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read

    outputs:
      artifact-sha256: ${{ steps.hash.outputs.sha256 }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Package artifact
        run: |
          tar -czf build.tar.gz -C build .
          sha256sum build.tar.gz | awk '{print $1}' > build.sha256

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-artifact
          path: |
            build.tar.gz
            build.sha256
          retention-days: 30

      - name: Generate artifact attestation
        uses: actions/attest@v4
        if: github.event_name == 'push'
        with:
          subject-path: 'build'
          provenance-format: 'slsa'

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: release-artifact
          path: .

      - name: Extract build artifact
        run: |
          mkdir -p build
          tar -xzf build.tar.gz -C build
          ls -la build/

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: build
          format: spdx-json
          output-file: sbom.spdx.json
          artifact-ref: 'health-app:${{ github.ref_name }}'

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-artifact
          path: sbom.spdx.json
          retention-days: 90

      - name: Upload SBOM to GitHub Security
        uses: github/codeql-action@v4
        if: github.event_name == 'push'
        with:
          sarif_file: sbom.spdx.json
          category: '/sbom'

  scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: release-artifact
          path: .

      - name: Extract build artifact
        run: |
          mkdir -p build
          tar -xzf build.tar.gz -C build
          ls -la build/

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          scan-ref: 'build'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          limit: '50'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action@v4
        if: github.event_name == 'push'
        with:
          sarif_file: trivy-results.sarif
          category: '/trivy'

      - name: Upload Trivy artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-artifact
          path: trivy-results.sarif
          retention-days: 30

  sign:
    name: Sign Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: release-artifact
          path: .

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign build artifact
        run: |
          cosign sign --yes --tlog-upload=true \
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}

        env:
          COSIGN_EXPERIMENTAL: '1'

      - name: Verify signature
        run: |
          cosign verify \
            ghcr.io/${{ github.repository }}:${{ github.ref_name }} \
            --certificate-identity=https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/tags/${{ github.ref_name }} \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build, sbom, scan, sign]

    permissions:
      contents: write

    if: github.event_name == 'push'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          files: |
            artifacts/release-artifact/build.tar.gz
            artifacts/release-artifact/build.sha256
            artifacts/sbom-artifact/sbom.spdx.json
            artifacts/trivy-artifact/trivy-results.sarif
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        if: false
        run: |
          echo "Docker image push would happen here if Docker was configured"
          echo "For now, GHCR package is updated via cosign sign above"
